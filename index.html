<!DOCTYPE html>

<head>
  <title>KokoLoad</title>

  <style>.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: #111;
  color: #fff;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  background: red;
  color: white;
  cursor: pointer;
}

button:hover {
  background: darkred;
}
