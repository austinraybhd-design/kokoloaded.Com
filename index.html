<!DOCTYPE html>
<html>
<head>
  <title>KokoLoad</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
    }

    header {
      background: #000;
      padding: 15px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      border-bottom: 2px solid #ff4d00;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }

    button {
      background: #ff4d00;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #ff6600;
    }
  </style>.card img {
  border-radius: 10px;
  margin-bottom: 10px;
}
</head>

<body>

<header>KokoLoad 🔥</header>

<div class="container">

  <div class="card">
    <h3>🎵 Music</h3>
    <p>Davido - New Song</p>
    <a href="#"><button>Download</button></a>
  </div>

  <div class="card">
    <h3>🎬 Movie</h3>
    <p>Fast X</p>
    <a href="#"><button>Watch</button></a>
  </div>

  <div class="card">
    <h3>🎧 Album</h3>
    <p>Burna Boy - I Told Them</p>
    <a href="#"><button>Download</button></a>
  </div>

  <div <div class="card">
  <img src="https://via.placeholder.com/200x250" width="100%">
  <h3>🎬 Movie</h3>
  <p>Fast X</p>
  <a href="#"><button>Watch</button></a>
</div>
    <h3>🎥 Series</h3>
    <p>Money Heist</p>
    <a href="#"><button>Watch</button></a>
  </div>

</div>

</body>
</html>
